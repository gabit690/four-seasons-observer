<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/global.css" />
    <title>Four seasons observer</title>
  </head>
  <body>
    <header class="glass">
      <h1>four seasons</h1>
    </header>
    <main>
      <div class="scroll-wrapper glass">
        <div class="reference-mark">
          <div class="triangle"></div>
        </div>
        <div id="scrollable-container">
          <div class="info-card default-color">
            <p>scroll</p>
            <p>&#128071;</p>
          </div>
          <div class="info-card autumn-color" data-image="autumn-bg">
            <p>autumn</p>
          </div>
          <div class="info-card winter-color" data-image="winter-bg">
            <p>winter</p>
          </div>
          <div class="info-card spring-color" data-image="spring-bg">
            <p>spring</p>
          </div>
          <div class="info-card summer-color" data-image="summer-bg">
            <p>summer</p>
          </div>
          <div class="info-card default-color">
            <p>scroll</p>
            <p>&#128070;</p>
          </div>
        </div>
      </div>
    </main>
    <footer class="glass">
      <p class="copyright">Developed by Gabit - 2026</p>
    </footer>
    <script src="scripts/images-preload.js"></script>
    <script src="scripts/seasons-observer.js"></script>
  </body>
</html>
