<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Four seasons observer</title>
  </head>
  <body>
    <header>
      <h1>four seasons</h1>
    </header>
    <main>
      <div class="scroll-wrapper">
        <div class="reference-mark">
          <div class="triangle left"></div>
          <div class="triangle right"></div>
        </div>
        <div id="scrollable-container">
          <div class="info-container default-color" data-color="default-color">
            <p>scroll</p>
            <p>&#128071;</p>
          </div>
          <div
            id="autumn-container"
            class="info-container autumn-color"
            data-color="autumn-color"
          >
            <p>autumn</p>
          </div>
          <div
            id="winter-container"
            class="info-container winter-color"
            data-color="winter-color"
          >
            <p>winter</p>
          </div>
          <div
            id="spring-container"
            class="info-container spring-color"
            data-color="spring-color"
          >
            <p>spring</p>
          </div>
          <div
            id="summer-container"
            class="info-container summer-color"
            data-color="summer-color"
          >
            <p>summer</p>
          </div>
          <div class="info-container default-color" data-color="default-color">
            <p>scroll</p>
            <p>&#128071;</p>
          </div>
        </div>
        <div class="reference-line-bottom"></div>
      </div>
    </main>
    <footer>
      <p class="copyright">Developed by Gabit - 2026</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
